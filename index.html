<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Survivor Prototype</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="game-container"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="row">
      <div class="label" id="level-text">Lv 1</div>
    </div>

    <div class="bar">
      <div class="barFill" id="hp-fill"></div>
      <div class="barText">HP</div>
    </div>

    <div class="bar">
      <div class="barFill" id="exp-fill"></div>
      <div class="barText">EXP</div>
    </div>

    <div class="bar">
      <div class="barFill" id="skill-fill"></div>
      <div class="barText" id="skill-text">E KEY: TIME STOP</div>
    </div>

    <div class="hint">WASD: move / E: time stop / Auto attack</div>
  </div>

  <!-- Level Up -->
  <div id="levelup-screen" class="overlay" style="display:none;">
    <div class="panel">
      <h2>LEVEL UP</h2>
      <button id="choice-firerate">Fire Rate +</button>
      <button id="choice-speed">Bullet Speed +</button>
      <button id="choice-multishot">Multi Shot +</button>
    </div>
  </div>

  <!-- Game Over -->
  <div id="gameover-screen" class="overlay" style="display:none;">
    <div class="panel">
      <h2>GAME OVER</h2>
      <button id="restart-btn">Restart</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
